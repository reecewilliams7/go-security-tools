{{define "base"}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST{{if .Title}} – {{.Title}}{{end}}</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f4f6f9;
            color: #1f2937;
            min-height: 100vh;
        }

        /* Nav */
        nav {
            background: #0f172a;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 0;
            height: 56px;
        }

        .nav-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f8fafc;
            letter-spacing: 0.05em;
            margin-right: 2rem;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0 1rem;
            height: 56px;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            transition: color 0.15s, background 0.15s;
        }

        nav a:hover {
            color: #f8fafc;
            background: #1e293b;
        }

        /* Layout */
        main {
            max-width: 860px;
            margin: 2.5rem auto;
            padding: 0 1.25rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #0f172a;
        }

        h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: #0f172a;
        }

        /* Card */
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08), 0 2px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.25rem;
        }

        /* Form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
        }

        select,
        input[type="number"],
        input[type="text"],
        textarea {
            padding: 0.5rem 0.65rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.95rem;
            background: #fff;
            color: #1f2937;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        select:focus,
        input[type="number"]:focus,
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .checkboxes {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #6366f1;
            cursor: pointer;
        }

        .checkbox-item span {
            font-size: 0.9rem;
            color: #374151;
        }

        .btn {
            background: #4f46e5;
            color: #fff;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #4338ca;
        }

        /* Alert */
        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 0.85rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        /* Result card */
        .result-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08), 0 2px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .result-header {
            background: #0f172a;
            color: #f8fafc;
            padding: 0.75rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .result-body {
            padding: 1.25rem;
        }

        .result-section {
            margin-bottom: 1.1rem;
        }

        .result-section:last-child {
            margin-bottom: 0;
        }

        .result-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #6b7280;
            margin-bottom: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        pre {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 0.75rem;
            font-size: 0.8rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            color: #1f2937;
            font-family: 'SFMono-Regular', Consolas, monospace;
        }

        .copy-btn {
            background: #e5e7eb;
            color: #374151;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: #d1d5db;
        }

        .copy-btn.copied {
            background: #d1fae5;
            color: #065f46;
        }

        /* Grid for index page */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .feature-link {
            text-decoration: none;
            color: inherit;
        }

        .feature-link .card:hover {
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.15), 0 4px 20px rgba(79, 70, 229, 0.08);
        }

        .feature-icon {
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
        }

        .feature-desc {
            margin-top: 0.4rem;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .results-heading {
            font-size: 1rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 1rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 1rem 0;
        }
    </style>
</head>

<body>
    <nav>
        <span class="nav-brand">GST</span>
        <a href="/">Home</a>
        <a href="/jwk">JWK Creator</a>
        <a href="/client-credentials">Client Credentials</a>
        <a href="/pkce">PKCE</a>
        <a href="/jwt">JWT Decoder</a>
    </nav>
    <main>
        {{template "content" .}}
    </main>
    <script>
        function copyText(btnEl, targetId) {
            const el = document.getElementById(targetId);
            if (!el) return;
            navigator.clipboard.writeText(el.textContent.trim()).then(() => {
                btnEl.textContent = 'Copied!';
                btnEl.classList.add('copied');
                setTimeout(() => { btnEl.textContent = 'Copy'; btnEl.classList.remove('copied'); }, 1500);
            });
        }
    </script>
</body>

</html>
{{end}}
